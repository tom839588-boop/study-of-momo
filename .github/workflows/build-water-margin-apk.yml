name: Build APK
on:
  push:
    paths:
      - 'water-margin-rpg/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          yes | sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>/dev/null || true

      - name: Create launcher icon
        run: |
          cd water-margin-rpg
          mkdir -p android/app/src/main/res/mipmap-hdpi android/app/src/main/res/mipmap-mdpi android/app/src/main/res/mipmap-xhdpi android/app/src/main/res/mipmap-xxhdpi android/app/src/main/res/mipmap-xxxhdpi
          # Generate minimal 48x48 red PNG icon
          python3 << 'PYEOF'
import struct, zlib
def create_png(w,h,r,g,b):
    sig=b'\x89PNG\r\n\x1a\n'
    ihdr=struct.pack('>IIBBBBB',w,h,8,2,0,0,0)
    raw=b''
    for y in range(h):
        raw+=b'\x00'
        for x in range(w):
            raw+=bytes([r,g,b])
    def chunk(ct,data):
        c=ct+data
        return struct.pack('>I',len(data))+c+struct.pack('>I',zlib.crc32(c)&0xffffffff)
    return sig+chunk(b'IHDR',ihdr)+chunk(b'IDAT',zlib.compress(raw))+chunk(b'IEND',b'')
png=create_png(48,48,180,30,30)
for d in ['mipmap-hdpi','mipmap-mdpi','mipmap-xhdpi','mipmap-xxhdpi','mipmap-xxxhdpi']:
    with open(f'android/app/src/main/res/{d}/ic_launcher.png','wb') as f:
        f.write(png)
PYEOF

      - name: Copy web assets
        run: |
          mkdir -p water-margin-rpg/android/app/src/main/assets
          cp water-margin-rpg/www/index.html water-margin-rpg/android/app/src/main/assets/index.html

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Build APK
        run: |
          cd water-margin-rpg/android
          ANDROID_HOME=$ANDROID_SDK_ROOT gradle assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: water-margin-rpg-apk
          path: water-margin-rpg/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
